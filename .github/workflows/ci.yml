# CI mirrors the local Stop-hook gate: verify fast on every push, plus the
# Phase 0 platform gate (build matrix + pluginval strictness 5). Audio Layer-E
# (auval, host loads, listening) stays macOS-local and human-run.
name: ci
on:
  push:
  pull_request:
jobs:
  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify fast
        run: ./verify fast

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: configure
        run: cmake -S . -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build "$GITHUB_WORKSPACE/build" -j3
      - name: pluginval (VST3, strictness 5)
        run: |
          curl -sL -o pluginval.zip https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip
          unzip -q pluginval.zip
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 5 --validate build/HYPERSAW_assets/HYPERSAW.vst3
      - name: bench (informational)
        run: ./build/renderer_bench || true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: configure
        run: cmake -S . -B build
      - name: build
        run: cmake --build build --config Release -j3
      - name: pluginval (VST3, strictness 5)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pv
          $vst3 = Get-ChildItem -Recurse -Filter HYPERSAW.vst3 build | Select-Object -First 1
          & pv/pluginval.exe --strictness-level 5 --validate $vst3.FullName
