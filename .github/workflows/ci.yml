# CI mirrors the local Stop-hook gate: it runs the project's ONE oracle, not
# new checks. Audio-plugin Layer-E (pluginval/auval/host loads) is macOS-local
# and human-run, so CI runs `fast` only (kit README, CI-is-core note).
# Inert until a GitHub remote exists.
name: ci
on:
  push:
  pull_request:
jobs:
  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify fast
        run: ./verify fast
